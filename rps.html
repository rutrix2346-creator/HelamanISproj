<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Match Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .game-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: none;
        }
        .btn-choice {
            font-size: 1.5rem;
            padding: 15px;
            transition: all 0.2s ease;
        }
        .btn-choice:hover {
            transform: translateY(-3px);
        }
        .score-number {
            font-size: 2.2rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container my-5">
    
    <div class="row justify-content-center mb-4">
        <div class="col-md-6 col-lg-5 text-center">
            <div class="btn-group w-100" role="group">
                <a href="index.html" class="btn btn-outline-secondary btn-sm">📄 Resume</a>
                <a href="rps.html" class="btn btn-secondary btn-sm active">🎮 Play RPS</a>
                <a href="travel.html" class="btn btn-outline-secondary btn-sm">✈️ Travel</a>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 text-center">
            
            <div class="card game-card p-4">
                <h2 class="fw-bold mb-3 text-dark">RPS Arena</h2>
                <p class="text-muted small">Creative Expansion Feature: Choose a target goal below to play a structured match series!</p>
                
                <div class="row g-2 align-items-center justify-content-center mb-4 bg-light p-2 rounded">
                    <div class="col-auto">
                        <label for="matchGoal" class="form-label mb-0 small fw-bold">First To:</label>
                    </div>
                    <div class="col-4">
                        <select id="matchGoal" class="form-select form-select-sm" onchange="resetGame()">
                            <option value="3">3 Wins</option>
                            <option value="5">5 Wins</option>
                            <option value="10">10 Wins</option>
                        </select>
                    </div>
                </div>

                <div class="row bg-dark text-white rounded py-3 mb-4 mx-1">
                    <div class="col-4">
                        <div class="small text-muted text-uppercase font-monospace">Player</div>
                        <div id="player-score" class="score-number text-primary">0</div>
                    </div>
                    <div class="col-4">
                        <div class="small text-muted text-uppercase font-monospace">Ties</div>
                        <div id="ties-score" class="score-number text-warning">0</div>
                    </div>
                    <div class="col-4">
                        <div class="small text-muted text-uppercase font-monospace">CPU</div>
                        <div id="computer-score" class="score-number text-danger">0</div>
                    </div>
                </div>

                <div class="alert alert-secondary py-2 mb-3 font-monospace small" id="choices-display">
                    Select a weapon to launch the match.
                </div>

                <div class="fs-4 fw-bold mb-4 min-fluid" style="min-height: 40px;" id="result-message"></div>

                <div id="game-controls">
                    <div class="d-grid gap-2 d-md-flex justify-content-center">
                        <button class="btn btn-outline-primary btn-choice flex-fill" onclick="playGame('Rock')">✊<br><span class="fs-6 fw-bold">Rock</span></button>
                        <button class="btn btn-outline-primary btn-choice flex-fill" onclick="playGame('Paper')">✋<br><span class="fs-6 fw-bold">Paper</span></button>
                        <button class="btn btn-outline-primary btn-choice flex-fill" onclick="playGame('Scissors')">✌️<br><span class="fs-6 fw-bold">Scissors</span></button>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-top">
                    <button class="btn btn-light btn-sm text-muted w-100" onclick="resetGame()">Reset Match Parameters</button>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    let playerScore = 0;
    let computerScore = 0;
    let tiesScore = 0;

    const choices = ['Rock', 'Paper', 'Scissors'];

    function playGame(playerChoice) {
        const goal = parseInt(document.getElementById('matchGoal').value);
        if (playerScore >= goal || computerScore >= goal) return;

        const randomIndex = Math.floor(Math.random() * 3);
        const computerChoice = choices[randomIndex];

        let result = '';
        if (playerChoice === computerChoice) {
            result = "<span class='text-warning'>It's a tie round!</span>";
            tiesScore++;
        } else if (
            (playerChoice === 'Rock' && computerChoice === 'Scissors') ||
            (playerChoice === 'Paper' && computerChoice === 'Rock') ||
            (playerChoice === 'Scissors' && computerChoice === 'Paper')
        ) {
            result = "<span class='text-success'>You score a point!</span>";
            playerScore++;
        } else {
            result = "<span class='text-danger'>Computer scores a point!</span>";
            computerScore++;
        }

        document.getElementById('choices-display').innerHTML = `You held: <strong>${playerChoice}</strong> | CPU held: <strong>${computerChoice}</strong>`;
        document.getElementById('result-message').innerHTML = result;
        document.getElementById('player-score').innerText = playerScore;
        document.getElementById('computer-score').innerText = computerScore;
        document.getElementById('ties-score').innerText = tiesScore;

        checkMatchEnd(goal);
    }

    function checkMatchEnd(goal) {
        if (playerScore === goal) {
            document.getElementById('result-message').innerHTML = "<div class='alert alert-success fw-bold m-0'>🏆 Match Over! You defeat the CPU!</div>";
            disableInputs();
        } else if (computerScore === goal) {
            document.getElementById('result-message').innerHTML = "<div class='alert alert-danger fw-bold m-0'>❌ Match Over! The CPU wins!</div>";
            disableInputs();
        }
    }

    function disableInputs() {
        document.getElementById('game-controls').innerHTML = `<div class='alert alert-dark text-center w-100 m-0'>Series Concluded. Use parameters reset below to run it back!</div>`;
    }

    function resetGame() {
        playerScore = 0;
        computerScore = 0;
        tiesScore = 0;
        
        document.getElementById('player-score').innerText = 0;
        document.getElementById('computer-score').innerText = 0;
        document.getElementById('ties-score').innerText = 0;
        document.getElementById('choices-display').innerText = 'Select a weapon to launch the match.';
        document.getElementById('result-message').innerHTML = '';
        
        document.getElementById('game-controls').innerHTML = `
            <div class="d-grid gap-2 d-md-flex justify-content-center">
                <button class="btn btn-outline-primary btn-choice flex-fill" onclick="playGame('Rock')">✊<br><span class="fs-6 fw-bold">Rock</span></button>
                <button class="btn btn-outline-primary btn-choice flex-fill" onclick="playGame('Paper')">✋<br><span class="fs-6 fw-bold">Paper</span></button>
                <button class="btn btn-outline-primary btn-choice flex-fill" onclick="playGame('Scissors')">✌️<br><span class="fs-6 fw-bold">Scissors</span></button>
            </div>`;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
